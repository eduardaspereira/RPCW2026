{% extends "layout.html" %}

{% block title %}Linhas Temporais{% endblock %}

{% block content %}
    <div class="w3-container w3-indigo w3-padding-16">
        <h2><i class="fa fa-clock-o w3-margin-right"></i>Linhas Temporais</h2>
    </div>

    <div class="w3-container w3-padding-32">
        {% if linhas %}
        <table class="w3-table-all w3-card-4 w3-hoverable">
            <thead>
                <tr class="w3-light-indigo">
                    <th>ID</th>
                    <th>Nº Livros</th>
                    <th>Link</th>
                </tr>
            </thead>
            <tbody>
                {% for l in linhas %}
                <tr>
                    <td>{{ l.id }}</td>
                    <td>{{ l.numLivros }}</td>
                    <td>
                        <a href="/linha/{{ l.id }}" class="w3-text-indigo"><i class="fa fa-arrow-right"></i> Ver</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="w3-panel w3-pale-yellow">
            <p>Nenhuma linha temporal encontrada.</p>
        </div>
        {% endif %}
    </div>
{% endblock %}
