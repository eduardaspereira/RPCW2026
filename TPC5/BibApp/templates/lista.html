{% extends "layout.html" %}

{% block title %}Catálogo de Livros{% endblock %}

{% block content %}
    <div class="w3-container w3-teal w3-padding-16">
        <h2><i class="fa fa-book w3-margin-right"></i>Catálogo Temporal</h2>
    </div>

    <div class="w3-container w3-padding-32">
        <table class="w3-table-all w3-card-4 w3-hoverable">
            <thead>
                <tr class="w3-light-blue">
                    <th>Título</th>
                    <th>Tipo</th>
                    <th>Autor</th>
                    <th>País</th>
                </tr>
            </thead>
            <tbody>
                {% for l in livros %}
                <tr>
                    <td>
                        <a href="/livro/{{l.id}}" class="w3-text-teal" style="text-decoration:none">
                            <b>{{ l.titulo }}</b>
                        </a>
                    </td>
                    <td>
                        <span class="w3-tag w3-round {{ l.color }}">{{ l.tipo }}</span>
                    </td>
                    <td>{{ l.autor }}</td>
                    <td>{{ l.pais }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
